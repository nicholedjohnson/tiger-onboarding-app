<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tiger Data Onboarding</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; overflow: hidden; height: 100vh; }
  input:focus { outline: none; border-color: #d4f534 !important; }
  button { font-family: inherit; }
  button:hover { opacity: 0.9; }
  .progress-bar { display: flex; gap: 4px; padding: 16px 24px; background: #1a1a1a; border-bottom: 1px solid #333; }
  .progress-item { flex: 1; display: flex; align-items: center; gap: 6px; padding: 8px 10px; border-radius: 8px; border: 1px solid transparent; transition: all 0.3s; }
  .progress-item.active { background: rgba(212,245,52,0.13); border-color: rgba(212,245,52,0.33); }
  .progress-dot { width: 24px; height: 24px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 11px; transition: all 0.3s; flex-shrink: 0; }
  .progress-label { font-size: 11px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .content { flex: 1; overflow: auto; height: calc(100vh - 57px); }
  .section { padding: 40px 48px; max-width: 700px; margin: 0 auto; }
  .section-center { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: calc(100vh - 57px); padding: 40px; }
  h1 { font-size: 36px; font-weight: 800; margin-bottom: 8px; }
  h2 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
  h3 { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
  .btn-primary { padding: 12px 28px; border-radius: 10px; border: none; background: #d4f534; color: #0a0a0a; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .btn-secondary { padding: 10px 20px; border-radius: 10px; border: 1px solid #333; background: transparent; color: #999; font-size: 13px; cursor: pointer; }
  .card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 16px 18px; transition: all 0.3s; }
  .input-field { padding: 14px 18px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 15px; width: 100%; }

  /* Quiz option styling */
  .quiz-option { padding: 14px 18px; border-radius: 12px; border: 1px solid #333; background: #1a1a1a; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 12px; }
  .quiz-option:hover { background: #222; }
  .quiz-option.correct { background: rgba(74,222,128,0.13); border-color: #4ade80; }
  .quiz-option.incorrect { background: rgba(248,113,113,0.13); border-color: #f87171; }
  .quiz-letter { width: 28px; height: 28px; border-radius: 14px; background: rgba(51,51,51,0.53); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #999; flex-shrink: 0; }

  /* Timeline */
  .timeline { position: relative; padding-left: 32px; }
  .timeline::before { content: ''; position: absolute; left: 11px; top: 8px; bottom: 8px; width: 2px; background: linear-gradient(to bottom, #d4f534, #7b9fc7); }
  .timeline-item { display: flex; gap: 20px; margin-bottom: 24px; cursor: pointer; transition: opacity 0.4s; }
  .timeline-dot { width: 24px; height: 24px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; z-index: 1; transition: all 0.3s; font-size: 12px; }

  /* Grid layouts */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }

  /* Values match game */
  .match-item { padding: 10px 14px; border-radius: 10px; cursor: pointer; transition: all 0.2s; border: 1px solid #333; }
  .match-item:hover { background: #222; }
  .match-item.selected { background: rgba(212,245,52,0.13); border-color: #d4f534; }
  .match-item.matched { background: rgba(74,222,128,0.13); border-color: rgba(74,222,128,0.33); opacity: 0.7; }

  /* Progress steps */
  .quiz-progress { display: flex; gap: 4px; margin-bottom: 28px; }
  .quiz-progress-dot { flex: 1; height: 4px; border-radius: 2px; transition: background 0.3s; }

  @media (max-width: 700px) {
    .grid-4 { grid-template-columns: repeat(2, 1fr); }
    .grid-2 { grid-template-columns: 1fr; }
    .progress-label { display: none; }
    .section, .section-center { padding: 24px 20px; }
  }
</style>
</head>
<body>

<div id="app"></div>

<script>
// ─── Data ────────────────────────────────────────────────────
const SECTIONS = [
  { id: "welcome", title: "Welcome to the Jungle", icon: "⚡" },
  { id: "story", title: "Our Story", icon: "📖" },
  { id: "products", title: "What We Build", icon: "🚀" },
  { id: "values", title: "Our Values", icon: "💛" },
  { id: "team", title: "Meet the Pride", icon: "👥" },
  { id: "quiz", title: "Jungle Quiz", icon: "🏆" },
];

const TIMELINE = [
  { year: "1999", text: "Ajay & Mike meet in Germany", emoji: "🍺" },
  { year: "2015", text: "iobeam founded — IoT data analysis platform", emoji: "🚀" },
  { year: "2017", text: "Pivoted to Tiger Data (Timescale) — time-series on PostgreSQL", emoji: "🐯" },
  { year: "2019", text: "Cloud platform launched", emoji: "☁️" },
  { year: "2023", text: "Expanded to relational workloads & AI/vector search", emoji: "🤖" },
  { year: "Now", text: "The PostgreSQL cloud for all demanding applications", emoji: "🌍" },
];

const PRODUCTS = [
  { name: "Time-Series", icon: "⚡", desc: "Automatic partitioning, columnar compression, real-time aggregation, and infinite tiered storage for time-series workloads.", color: "#d4f534" },
  { name: "Relational Workloads", icon: "🔗", desc: "High-performance, cost-efficient PostgreSQL for your most demanding relational workloads.", color: "#7b9fc7" },
  { name: "AI Applications", icon: "🧠", desc: "High-performance vector database built on PostgreSQL with lightning-fast vector search — pgvector and more.", color: "#c084fc" },
];

const VALUES = [
  { name: "Get sh*t done", icon: "✅", desc: "We bias toward action. Ship it, learn, iterate." },
  { name: "Be direct, with respect", icon: "💬", desc: "Honest feedback delivered with care. No politics." },
  { name: "Embrace the challenge", icon: "🐯", desc: "Hard problems are what make us great. Lean in." },
  { name: "Own the outcome", icon: "📈", desc: "Don't wait to be told. See it, own it, fix it." },
  { name: "Be excellent but humble", icon: "💡", desc: "High standards, low ego. Always learning." },
  { name: "Win together", icon: "🏆", desc: "No lone wolves. We succeed as a pride." },
];

const EXEC_TEAM = [
  { name: "Ajay Kulkarni", role: "CEO & Co-Founder" },
  { name: "Mike Freedman", role: "CTO & Co-Founder" },
  { name: "Cécile Davis", role: "People" },
  { name: "Hien Phan", role: "Marketing" },
  { name: "Jose Sahad", role: "Engineering" },
  { name: "Kerri Damm", role: "Finance" },
  { name: "Ramon Guiu", role: "Product & Sales" },
];

const QUIZ = [
  { q: "What was Tiger Data originally called?", opts: ["TimerDB", "iobeam", "PostgreScale", "DataTiger"], ans: 1, why: "The company started as iobeam in 2015, focused on IoT data analysis, before pivoting to become Tiger Data (Timescale)." },
  { q: "Where did co-founders Ajay and Mike first meet?", opts: ["NYC", "Silicon Valley", "Germany", "Princeton"], ans: 2, why: "Ajay and Mike first met in Germany back in 1999 — and have been friends (and beer buddies) ever since!" },
  { q: "Which database does Tiger Data build on top of?", opts: ["MySQL", "MongoDB", "PostgreSQL", "Redis"], ans: 2, why: "Tiger Data is 100% built on PostgreSQL, giving developers access to the entire PostgreSQL ecosystem." },
  { q: "Which of these is NOT one of Tiger Data's core values?", opts: ["Move fast, break things", "Get sh*t done", "Win together", "Embrace the challenge"], ans: 0, why: '"Move fast, break things" is a Facebook motto — at Tiger Data, we Get sh*t done, but with quality and ownership!' },
  { q: "What are the three main workload types Tiger Data supports?", opts: ["Time-series, Relational, AI", "Analytics, Streaming, Batch", "NoSQL, SQL, GraphQL", "OLTP, OLAP, HTAP"], ans: 0, why: "Tiger Data supports time-series workloads, relational workloads, and AI applications (with pgvector for vector search)." },
];

// ─── State ───────────────────────────────────────────────────
let state = {
  section: 0,
  completed: new Set(),
  userName: "", userRole: "", userFact: "", welcomed: false,
  revealedEvents: new Set([0]), activeEvent: 0,
  activeProduct: null,
  selectedValue: null, matchedValues: {}, showAllValues: false, shuffledDescs: null,
  quizQ: 0, quizSelected: null, quizShowResult: false, quizScore: 0, quizDone: false,
};

function initShuffledDescs() {
  const descs = VALUES.map(v => v.desc);
  for (let i = descs.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [descs[i], descs[j]] = [descs[j], descs[i]];
  }
  state.shuffledDescs = descs;
}
initShuffledDescs();

// ─── Render Engine ───────────────────────────────────────────
function render() {
  document.getElementById('app').innerHTML = `
    ${renderProgressBar()}
    <div class="content">${renderCurrentSection()}</div>
  `;
  attachEvents();
}

function renderProgressBar() {
  return `<div class="progress-bar">${SECTIONS.map((s, i) => {
    const done = state.completed.has(s.id);
    const active = state.section === i;
    const dotBg = done ? '#4ade80' : active ? '#d4f534' : '#333';
    const dotContent = done ? '✓' : s.icon;
    const labelColor = active ? '#d4f534' : done ? '#4ade80' : '#999';
    return `<div class="progress-item ${active ? 'active' : ''}">
      <div class="progress-dot" style="background:${dotBg};color:${done || active ? '#0a0a0a' : '#999'}">${dotContent}</div>
      <span class="progress-label" style="color:${labelColor}">${s.title}</span>
    </div>`;
  }).join('')}</div>`;
}

function goNext() {
  state.completed.add(SECTIONS[state.section].id);
  if (state.section < SECTIONS.length - 1) state.section++;
  render();
  document.querySelector('.content').scrollTop = 0;
}

// ─── Section Renderers ───────────────────────────────────────
function renderCurrentSection() {
  switch(SECTIONS[state.section].id) {
    case 'welcome': return renderWelcome();
    case 'story': return renderStory();
    case 'products': return renderProducts();
    case 'values': return renderValues();
    case 'team': return renderTeam();
    case 'quiz': return renderQuiz();
  }
}

function renderWelcome() {
  if (!state.welcomed) {
    return `<div class="section-center">
      <div style="max-width:500px;width:100%;text-align:center">
        <div style="font-size:64px;margin-bottom:16px">🐯</div>
        <h1>Welcome to the Jungle!</h1>
        <p style="color:#999;font-size:16px;margin-bottom:40px;line-height:1.5">Before we get started, tell us a bit about yourself. This info would normally be shared with your onboarding cohort!</p>
        <div style="display:flex;flex-direction:column;gap:16px">
          <input class="input-field" id="inp-name" placeholder="Your name" value="${state.userName}">
          <input class="input-field" id="inp-role" placeholder="Your role (e.g., Senior Engineer, Product Designer)" value="${state.userRole}">
          <input class="input-field" id="inp-fact" placeholder="A fun fact about you 🎉" value="${state.userFact}">
          <button class="btn-primary" id="btn-welcome" style="margin-top:8px;opacity:${state.userName.trim() ? 1 : 0.4};cursor:${state.userName.trim() ? 'pointer' : 'default'}">Let's Go! →</button>
        </div>
      </div>
    </div>`;
  }
  return `<div class="section-center">
    <div style="max-width:500px;width:100%;text-align:center">
      <div style="font-size:64px;margin-bottom:16px">🎉</div>
      <h1 style="color:#d4f534">Welcome, ${state.userName}!</h1>
      ${state.userRole ? `<p style="color:#7b9fc7;font-size:16px;margin-bottom:8px">${state.userRole}</p>` : ''}
      ${state.userFact ? `<div class="card" style="margin-bottom:32px"><p style="color:#999;font-size:13px;margin-bottom:4px">Fun fact:</p><p style="color:#fff;font-size:15px">"${state.userFact}"</p></div>` : ''}
      <p style="color:#999;font-size:15px;margin-bottom:32px;line-height:1.6">This self-paced experience covers Tiger Data's story, products, values, and team — plus a quiz at the end. Take about <strong style="color:#d4f534">15 minutes</strong>, then join the live session for the real fun!</p>
      <button class="btn-primary" onclick="goNext()">Start the Journey →</button>
    </div>
  </div>`;
}

function renderStory() {
  const allRevealed = state.revealedEvents.size === TIMELINE.length;
  return `<div class="section">
    <h2>Our Story</h2>
    <p style="color:#999;font-size:15px;margin-bottom:36px">Tap each milestone to uncover Tiger Data's journey — from a friendship in Germany to the PostgreSQL cloud.</p>
    <div class="timeline">
      ${TIMELINE.map((evt, i) => {
        const revealed = state.revealedEvents.has(i);
        const active = state.activeEvent === i;
        return `<div class="timeline-item" data-timeline="${i}" style="opacity:${revealed ? 1 : 0.4}">
          <div class="timeline-dot" style="background:${revealed ? '#d4f534' : '#333'};${active ? 'box-shadow:0 0 12px rgba(212,245,52,0.4)' : ''}">${revealed ? evt.emoji : '?'}</div>
          <div class="card" style="flex:1;${active ? 'background:rgba(212,245,52,0.08);border-color:rgba(212,245,52,0.27)' : ''}">
            <div style="font-size:13px;font-weight:700;color:${revealed ? '#d4f534' : '#999'};margin-bottom:4px">${evt.year}</div>
            <div style="font-size:15px;color:${revealed ? '#fff' : '#333'}">${revealed ? evt.text : 'Tap to reveal...'}</div>
          </div>
        </div>`;
      }).join('')}
    </div>
    ${allRevealed ? `<div style="text-align:center;margin-top:24px"><button class="btn-primary" onclick="goNext()">Next: What We Build →</button></div>` : ''}
  </div>`;
}

function renderProducts() {
  return `<div class="section">
    <h2>What We Build</h2>
    <p style="color:#999;font-size:15px;margin-bottom:12px">Tiger Data is the PostgreSQL cloud for demanding applications. Explore our three pillars:</p>
    <div class="card" style="margin-bottom:32px">
      <p style="color:#ccc;font-size:14px;line-height:1.6"><strong style="color:#d4f534">Key differentiators:</strong> 100% PostgreSQL, fast & scalable, worry-free ops (automatic backups, HA, SLAs), SOC 2 & GDPR compliant, cost-effective with S3 tiering, and world-class support at no extra charge.</p>
    </div>
    <div style="display:flex;flex-direction:column;gap:12px">
      ${PRODUCTS.map((p, i) => {
        const active = state.activeProduct === i;
        return `<div class="card" data-product="${i}" style="cursor:pointer;${active ? `background:${p.color}11;border-color:${p.color}55` : ''}">
          <div style="display:flex;align-items:center;gap:12px">
            <span style="font-size:28px">${p.icon}</span>
            <span style="flex:1;font-size:17px;font-weight:700">${p.name}</span>
            <span style="color:#999;transform:rotate(${active ? 90 : 0}deg);transition:transform 0.2s">▶</span>
          </div>
          ${active ? `<p style="color:#ccc;font-size:14px;line-height:1.6;margin-top:12px">${p.desc}</p>` : ''}
        </div>`;
      }).join('')}
    </div>
    <div style="text-align:center;margin-top:32px"><button class="btn-primary" onclick="goNext()">Next: Our Values →</button></div>
  </div>`;
}

function renderValues() {
  if (state.showAllValues) {
    return `<div class="section">
      <h2>Our Values</h2>
      <p style="color:#999;font-size:15px;margin-bottom:24px">Here are the values that guide everything we do at Tiger Data:</p>
      <div class="grid-2">
        ${VALUES.map(v => `<div class="card">
          <div style="font-size:24px;margin-bottom:8px">${v.icon}</div>
          <h4 style="font-size:14px;font-weight:700;color:#d4f534;margin-bottom:6px">${v.name}</h4>
          <p style="font-size:13px;color:#ccc;line-height:1.5">${v.desc}</p>
        </div>`).join('')}
      </div>
      <div style="text-align:center;margin-top:24px"><button class="btn-primary" onclick="goNext()">Next: Meet the Pride →</button></div>
    </div>`;
  }

  const matchedCount = Object.keys(state.matchedValues).length;
  const allMatched = matchedCount === VALUES.length;

  return `<div class="section">
    <h2>Our Values</h2>
    <p style="color:#999;font-size:15px;margin-bottom:12px">Can you match each value to its description? Click a value, then click its description.</p>
    <div style="display:flex;gap:6px;margin-bottom:20px">
      ${VALUES.map((_, i) => `<div style="flex:1;height:4px;border-radius:2px;background:${state.matchedValues[i] !== undefined ? '#4ade80' : '#333'}"></div>`).join('')}
    </div>
    <div class="grid-2">
      <div style="display:flex;flex-direction:column;gap:8px">
        <div style="font-size:11px;font-weight:700;color:#999;text-transform:uppercase;margin-bottom:4px">VALUES</div>
        ${VALUES.map((v, i) => {
          const matched = state.matchedValues[i] !== undefined;
          const selected = state.selectedValue === i;
          return `<div class="match-item ${matched ? 'matched' : ''} ${selected ? 'selected' : ''}" data-value="${i}" style="${matched ? 'cursor:default' : ''}">
            <span style="font-size:13px;color:${matched ? '#4ade80' : '#fff'}">${v.icon} ${v.name}</span>
          </div>`;
        }).join('')}
      </div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <div style="font-size:11px;font-weight:700;color:#999;text-transform:uppercase;margin-bottom:4px">DESCRIPTIONS</div>
        ${state.shuffledDescs.map((desc, i) => {
          const used = Object.values(state.matchedValues).includes(i);
          return `<div class="match-item ${used ? 'matched' : ''}" data-desc="${i}" style="${used ? 'cursor:default;opacity:0.5' : state.selectedValue !== null ? 'cursor:pointer' : 'cursor:default'}">
            <span style="font-size:12px;color:${used ? '#4ade80' : '#ccc'};line-height:1.4">${desc}</span>
          </div>`;
        }).join('')}
      </div>
    </div>
    <div style="text-align:center;margin-top:24px;display:flex;gap:12px;justify-content:center">
      <button class="btn-secondary" id="btn-skip-values">Skip — just show me</button>
      ${allMatched ? `<button class="btn-primary" onclick="goNext()">Next: Meet the Pride →</button>` : ''}
    </div>
  </div>`;
}

function renderTeam() {
  return `<div class="section">
    <h2>Meet the Pride</h2>
    <p style="color:#999;font-size:15px;margin-bottom:20px">Your People Partners — the first faces you'll see:</p>
    <div class="grid-2" style="margin-bottom:32px">
      ${[
        { name: "Agne Rodríguez Leslie", role: "People Partner", loc: "Alicante, Spain", supports: "Engineering, Product, IT, Technical Services" },
        { name: "Nichole Johnson", role: "People Partner", loc: "Minnesota, US", supports: "Finance, Marketing, Sales" },
      ].map(pp => `<div class="card" style="border-color:rgba(212,245,52,0.2);padding:20px">
        <div style="width:48px;height:48px;border-radius:24px;background:rgba(212,245,52,0.13);display:flex;align-items:center;justify-content:center;margin-bottom:12px;font-size:22px">👤</div>
        <h4 style="font-size:15px;font-weight:700;margin-bottom:4px">${pp.name}</h4>
        <p style="font-size:13px;color:#d4f534;margin-bottom:4px">${pp.role}</p>
        <p style="font-size:12px;color:#999;margin-bottom:8px">${pp.loc}</p>
        <p style="font-size:12px;color:#ccc">Supporting: ${pp.supports}</p>
      </div>`).join('')}
    </div>
    <h3>Executive Team</h3>
    <div class="grid-4">
      ${EXEC_TEAM.map(m => {
        const initials = m.name.split(' ').map(n => n[0]).join('');
        return `<div class="card" style="text-align:center;padding:16px 12px;cursor:default">
          <div style="width:40px;height:40px;border-radius:20px;background:#333;display:flex;align-items:center;justify-content:center;margin:0 auto 8px;font-size:14px;font-weight:700;color:#d4f534">${initials}</div>
          <p style="font-size:12px;font-weight:600;margin-bottom:2px">${m.name}</p>
          <p style="font-size:11px;color:#999">${m.role}</p>
        </div>`;
      }).join('')}
    </div>
    <div style="text-align:center;margin-top:32px"><button class="btn-primary" onclick="goNext()">Final Stop: Jungle Quiz! →</button></div>
  </div>`;
}

function renderQuiz() {
  if (state.quizDone) {
    const pct = Math.round((state.quizScore / QUIZ.length) * 100);
    const emoji = pct === 100 ? '🏆' : pct >= 60 ? '🐯' : '📚';
    const msg = pct === 100 ? "Perfect score! You're a true tiger!" : pct >= 60 ? "Nice work — you're jungle-ready!" : "No worries — you'll pick it all up fast!";
    return `<div class="section-center">
      <div style="font-size:72px;margin-bottom:16px">${emoji}</div>
      <h2 style="font-size:32px;margin-bottom:8px">${state.quizScore}/${QUIZ.length} Correct!</h2>
      <p style="color:#d4f534;font-size:18px;margin-bottom:32px">${msg}</p>
      <div class="card" style="text-align:center;max-width:440px;border-color:rgba(212,245,52,0.2);padding:24px 32px">
        <div style="font-size:32px;margin-bottom:12px">🎓</div>
        <h3 style="font-size:18px;margin-bottom:8px">You're all set for the live session!</h3>
        <p style="color:#999;font-size:14px;line-height:1.6">The live onboarding will focus on meeting your cohort, hands-on activities, and Q&A with the team. See you there!</p>
      </div>
    </div>`;
  }

  const q = QUIZ[state.quizQ];
  return `<div class="section">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
      <h2>Jungle Quiz</h2>
      <span style="font-size:14px;color:#999">${state.quizQ + 1} / ${QUIZ.length}</span>
    </div>
    <div class="quiz-progress">
      ${QUIZ.map((_, i) => `<div class="quiz-progress-dot" style="background:${i < state.quizQ ? '#4ade80' : i === state.quizQ ? '#d4f534' : '#333'}"></div>`).join('')}
    </div>
    <h3 style="font-size:20px;line-height:1.4;margin-bottom:24px">${q.q}</h3>
    <div style="display:flex;flex-direction:column;gap:10px">
      ${q.opts.map((opt, i) => {
        let cls = '';
        if (state.quizShowResult) {
          if (i === q.ans) cls = 'correct';
          else if (i === state.quizSelected) cls = 'incorrect';
        }
        const letterColor = state.quizShowResult && i === q.ans ? '#0a0a0a' : '#999';
        const letterBg = state.quizShowResult && i === q.ans ? '#4ade80' : 'rgba(51,51,51,0.53)';
        const textColor = state.quizShowResult ? (i === q.ans ? '#4ade80' : i === state.quizSelected ? '#f87171' : '#fff') : '#fff';
        return `<div class="quiz-option ${cls}" data-quiz-opt="${i}" style="${state.quizShowResult ? 'cursor:default' : ''}">
          <div class="quiz-letter" style="background:${letterBg};color:${letterColor}">${String.fromCharCode(65 + i)}</div>
          <span style="font-size:15px;color:${textColor}">${opt}</span>
        </div>`;
      }).join('')}
    </div>
    ${state.quizShowResult ? `
      <div class="card" style="margin-top:20px;border-color:${state.quizSelected === q.ans ? 'rgba(74,222,128,0.27)' : 'rgba(248,113,113,0.27)'}">
        <p style="font-size:14px;color:#ccc;line-height:1.5">${q.why}</p>
      </div>
      <div style="text-align:center;margin-top:20px">
        <button class="btn-primary" id="btn-quiz-next">${state.quizQ < QUIZ.length - 1 ? 'Next Question →' : 'See Results →'}</button>
      </div>
    ` : ''}
  </div>`;
}

// ─── Event Handling ──────────────────────────────────────────
function attachEvents() {
  const inpName = document.getElementById('inp-name');
  const inpRole = document.getElementById('inp-role');
  const inpFact = document.getElementById('inp-fact');
  if (inpName) {
    inpName.addEventListener('input', e => { state.userName = e.target.value; });
    inpRole?.addEventListener('input', e => { state.userRole = e.target.value; });
    inpFact?.addEventListener('input', e => { state.userFact = e.target.value; });
  }
  const btnWelcome = document.getElementById('btn-welcome');
  if (btnWelcome) {
    btnWelcome.addEventListener('click', () => {
      if (state.userName.trim()) { state.welcomed = true; render(); }
    });
  }

  document.querySelectorAll('[data-timeline]').forEach(el => {
    el.addEventListener('click', () => {
      const i = parseInt(el.dataset.timeline);
      state.revealedEvents.add(i);
      state.activeEvent = i;
      render();
    });
  });

  document.querySelectorAll('[data-product]').forEach(el => {
    el.addEventListener('click', () => {
      const i = parseInt(el.dataset.product);
      state.activeProduct = state.activeProduct === i ? null : i;
      render();
    });
  });

  document.querySelectorAll('[data-value]').forEach(el => {
    el.addEventListener('click', () => {
      const i = parseInt(el.dataset.value);
      if (state.matchedValues[i] !== undefined) return;
      state.selectedValue = state.selectedValue === i ? null : i;
      render();
    });
  });
  document.querySelectorAll('[data-desc]').forEach(el => {
    el.addEventListener('click', () => {
      if (state.selectedValue === null) return;
      const di = parseInt(el.dataset.desc);
      if (Object.values(state.matchedValues).includes(di)) return;
      const correctDesc = VALUES[state.selectedValue].desc;
      if (state.shuffledDescs[di] === correctDesc) {
        state.matchedValues[state.selectedValue] = di;
      }
      state.selectedValue = null;
      render();
    });
  });
  const btnSkipValues = document.getElementById('btn-skip-values');
  if (btnSkipValues) {
    btnSkipValues.addEventListener('click', () => { state.showAllValues = true; render(); });
  }

  document.querySelectorAll('[data-quiz-opt]').forEach(el => {
    el.addEventListener('click', () => {
      if (state.quizShowResult) return;
      const i = parseInt(el.dataset.quizOpt);
      state.quizSelected = i;
      state.quizShowResult = true;
      if (i === QUIZ[state.quizQ].ans) state.quizScore++;
      render();
    });
  });
  const btnQuizNext = document.getElementById('btn-quiz-next');
  if (btnQuizNext) {
    btnQuizNext.addEventListener('click', () => {
      if (state.quizQ < QUIZ.length - 1) {
        state.quizQ++;
        state.quizSelected = null;
        state.quizShowResult = false;
      } else {
        state.quizDone = true;
        state.completed.add('quiz');
      }
      render();
    });
  }
}

// ─── Init ────────────────────────────────────────────────────
render();
</script>

</html>
